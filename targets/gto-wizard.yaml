# GTO Wizard targets
targets:
  gto-wizard:
    platform: web
    url: https://wiz.codeovertcp.com

# LLM configuration
llm:
  provider: openai-compatible
  base_url: https://opencode.ai/zen/v1
  model: mimo-v2.5-free
  api_key_env: OPENCODE_ZEN_API_KEY
  max_retries: 3
  timeout: 60

# Runner defaults
defaults:
  workers: 2
  retry_attempts: 3
  screenshot_on_failure: true
