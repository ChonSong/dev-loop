# FEATURES.yaml — Machine-Readable Feature Checklist
#
# Place this in your project root to enable autonomous Spec Gap Detection.
# The coach-agent reads this during Phase 2.5 of every backlog health check.
#
# Items marked "missing" auto-generate backlog tasks.
# Items marked "stub" generate fix tasks.
# Items marked "present" are verified on every audit.
#
# Reference images in docs/ are auto-discovered for visual comparison.
#
# YAML structure:
#   version: schema version (integer)
#   last_audited: ISO timestamp, auto-updated by coach
#   pages[]:
#     route: URL path (required)
#     title: human name (optional)
#     status: "present" | "missing" | "stub" | "broken" (required)
#     reference: path to screenshot in docs/ (optional)
#     components[]: expected UI components
#       name: kebab-case component identifier (required)
#       status: same as above (required)
#     apis[]: expected API endpoints
#       endpoint: URL path (required)
#       status: same as above (required)
#   apis.general[]: shared/cross-cutting endpoints

version: 1
last_audited: null  # Auto-updated by coach on each audit

pages:
  # ─── Home Page ───────────────────────────────────────────────
  - route: /
    title: Home / Dashboard
    status: present
    components:
      - name: hero-section
        status: present
      - name: feature-grid
        status: present
      - name: quick-stats
        status: missing
      - name: navigation-header
        status: present
    apis: []

  # ─── Study / Training Page ───────────────────────────────────
  - route: /study
    title: Study (Training Mode)
    status: present
    components:
      - name: position-selector
        status: present
      - name: preflop-range-matrix
        status: present
      - name: postflop-board-display
        status: missing
      - name: action-button-check
        status: missing
      - name: action-button-bet-33
        status: missing
      - name: action-button-bet-50
        status: missing
      - name: action-button-bet-75
        status: missing
      - name: action-button-bet-125
        status: missing
      - name: action-button-fold
        status: missing
      - name: action-button-call
        status: missing
      - name: action-button-raise-50
        status: missing
      - name: action-button-raise-100
        status: missing
      - name: action-button-allin
        status: missing
      - name: street-navigation
        status: missing
      - name: pot-size-tracker
        status: missing
      - name: action-history-timeline
        status: missing
      - name: gto-comparison-overlay
        status: missing
    apis:
      - endpoint: GET /api/v1/study/spot
        status: missing
      - endpoint: POST /api/v1/study/answer
        status: missing
      - endpoint: POST /api/v1/solver/preflop-range
        status: present
      - endpoint: POST /api/v1/solver/postflop-strategy
        status: missing

  # ─── Quiz / Assessment Page ──────────────────────────────────
  - route: /quiz
    title: Quiz Training
    status: present
    components:
      - name: spot-display
        status: present
      - name: action-buttons
        status: present
      - name: gto-comparison
        status: present
      - name: leaderboard
        status: present
      - name: stats-panel
        status: present
      - name: category-filter
        status: present
      - name: difficulty-filter
        status: present
    apis:
      - endpoint: GET /api/v1/quiz/random
        status: present
      - endpoint: POST /api/v1/quiz/submit
        status: present
      - endpoint: GET /api/v1/quiz/stats/{id}
        status: present
      - endpoint: GET /api/v1/quiz/leaderboard
        status: present

  # ─── Feature page with stub content ──────────────────────────
  - route: /hand-history
    title: Hand History
    status: stub
    reference: docs/designs/hand-history.png
    components:
      - name: hand-table
        status: stub
      - name: batch-import
        status: missing
      - name: search-filter
        status: missing
    apis:
      - endpoint: GET /api/v1/hh/hands
        status: present
      - endpoint: POST /api/v1/hh/import
        status: present

  # ─── Planned page (not yet created) ──────────────────────────
  - route: /settings
    title: User Settings
    status: missing
    components:
      - name: profile-form
        status: missing
      - name: api-key-manager
        status: missing
    apis:
      - endpoint: GET /api/v1/user/settings
        status: missing
      - endpoint: PUT /api/v1/user/settings
        status: missing

  # ─── API-only service (no UI) ────────────────────────────────
  - route: null
    title: Solver Engine Service
    status: present
    components: []  # No UI components
    apis:
      - endpoint: POST /api/v1/solver/solve
        status: present
      - endpoint: GET /api/v1/solver/health
        status: present
      - endpoint: POST /api/v1/solver/postflop-strategy
        status: missing

# ─── General / Cross-Cutting APIs ────────────────────────────
apis:
  general:
    - endpoint: GET /api/v1/health
      status: present
    - endpoint: GET /api/v1/courses
      status: present
    - endpoint: GET /api/v1/courses/{id}
      status: present
    - endpoint: POST /api/v1/courses/{id}/progress
      status: present
