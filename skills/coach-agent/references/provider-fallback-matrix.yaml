# Provider Fallback Matrix
# Ordered: first available model wins. Coach iterates through tiers on failure.
# Status: active | throttled | insufficient | unreachable | unauthorized
# Budget rule: tiers 0-1 FREE (use freely), tiers 2-4 budget (frequent), tier 5-6 occasional paid (max 2/day)

tiers:
  - id: zen-big-pickle-free
    provider: opencode-zen
    model: big-pickle
    base_url: https://opencode.ai/zen/v1
    auth_env: OPENCODE_ZEN_API_KEY
    cost: free
    intelligence: medium
    status: throttled
    last_tested: '2026-06-27T21:35:00+10:00'
    throttle_reason: 'Free tier daily limit — resets ~5:00 AEST'

